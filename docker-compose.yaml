services:
  # PostgreSQL
  postgres:
    image: postgres:17
    container_name: exchange-postgres
    environment:
      POSTGRES_DB: exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exchange-network
    restart: unless-stopped

  # ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: exchange-clickhouse
    environment:
      CLICKHOUSE_DB: exchange
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exchange-network
    restart: unless-stopped

  # ui
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exchange-ui
    env_file:
      - path: ./ui/.env.example
        required: false
      - path: .env
        required: false
    ports:
      - "3000:3000"
    networks:
      - exchange-network
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:

networks:
  exchange-network:
    driver: bridge
